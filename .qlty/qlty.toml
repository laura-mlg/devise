# This configuration was generated with the setup-qlty-toml skill.
# For reference: https://docs.qlty.sh/qlty-toml
config_version = "0"

exclude_patterns = [
  "test/rails_app/db/**",
  "test/rails_app/public/**",
  "vendor/**",
]

test_patterns = [
  "**/test/**",
  "**/spec/**",
]

[smells]
mode = "comment"

# Required — points to the built-in Qlty plugin registry.
[[source]]
name = "default"
default = true

# Language linters
[[plugin]]
name = "rubocop"
mode = "comment"
package_file = "Gemfile"
package_filters = ["rubocop"]
config_files = [".rubocop.yml"]

[[plugin]]
name = "reek"
mode = "comment"
config_files = [".reek.yml"]

# Security scanners
[[plugin]]
name = "brakeman"
mode = "block"

[[plugin]]
name = "trufflehog"
mode = "block"

# Cross-language tools
[[plugin]]
name = "markdownlint"
mode = "comment"

[[plugin]]
name = "yamllint"
mode = "comment"

[[plugin]]
name = "actionlint"
mode = "comment"

# Triage: downgrade brakeman findings in spec/ test directories to monitor
[[triage]]
plugins = ["brakeman"]
file_patterns = ["spec/**"]
set.mode = "monitor"
